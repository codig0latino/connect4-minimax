<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>CONECTA CUATRO - Cheerful Connection</title>
<link rel="stylesheet" href="./styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Board specific styling */
        .game-board {
            box-shadow: 0 10px 0 #0056b3;
            border: 4px solid #0056b3;
        }

        .slot {
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.1);
        }

        .piece {
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        @keyframes dropIn {
            0% { transform: translateY(-400px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .piece-red {
            background: #ff4d4d;
            box-shadow: 0 6px 0 #b33636;
        }

        .piece-yellow {
            background: #ffd700;
            box-shadow: 0 6px 0 #b39700;
        }

        /* Hide scrollbars */
        body {
            overflow: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        .win-line {
            animation: pulse-win 1s infinite alternate;
            z-index: 20;
        }

        @keyframes pulse-win {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.2); }
        }

        .thinking-dots::after {
            content: '...';
            display: inline-block;
            width: 1.5em;
            animation: dots 1.5s infinite;
            text-align: left;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur-md shadow-sm">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-3xl">grid_4x4</span>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary tracking-tighter">CONECTA 4</h1>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 py-2 px-6 rounded-full bg-soft-sky text-primary hover:bg-primary hover:text-white font-bold transition-all" id="btn-show-difficulty">
<span class="material-symbols-outlined text-sm">tune</span>
<span class="text-xs uppercase tracking-widest" id="difficulty-badge">DIFÍCIL</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow grid grid-cols-2 md:flex md:flex-row items-center justify-center gap-x-4 gap-y-3 min-[380px]:gap-y-6 md:gap-16 px-container-padding pt-16 pb-3 min-[380px]:pt-20 min-[380px]:pb-6 md:pt-24 md:pb-24 overflow-hidden">
    <!-- Player Score Card -->
    <div class="flex flex-col gap-2 min-[380px]:gap-3 w-full max-w-[160px] md:max-w-none md:w-48 order-2 md:order-1 col-span-1">
        <div class="bg-tertiary p-3 min-[380px]:p-4 md:p-6 rounded-2xl min-[380px]:rounded-3xl md:rounded-full flex flex-col items-center transition-all shadow-[0_4px_0_#b33636] min-[380px]:shadow-[0_8px_0_#b33636] border-2 min-[380px]:border-4 border-white" id="card-player">
            <span class="font-label-caps text-xs min-[380px]:text-label-caps text-white uppercase">TÚ</span>
            <span class="font-score-number text-2xl min-[380px]:text-score-number text-white" id="score-player">0</span>
        </div>
        <div class="flex items-center justify-center gap-1.5 py-1.5 px-3 rounded-full bg-primary-container text-on-primary-container border border-primary animate-pulse text-xs min-[380px]:text-sm" id="turn-indicator">
            <div class="w-2 h-2 min-[380px]:w-3 min-[380px]:h-3 rounded-full bg-primary" id="turn-dot"></div>
            <span class="font-label-caps tracking-widest uppercase" id="turn-text">TU TURNO</span>
        </div>
    </div>
    <!-- The Game Board Section -->
    <div class="relative order-1 md:order-2 col-span-2">
        <!-- Main Board bg-primary p-4 -->
        <div class="game-board bg-primary p-3 min-[380px]:p-4 rounded-3xl flex flex-col gap-2 min-[380px]:gap-3 md:gap-board-gap relative z-10" id="board-container">
            <!-- Grid Interaction Layer -->
            <div class="flex gap-2 min-[380px]:gap-3 md:gap-board-gap h-full w-full absolute inset-0 z-20 cursor-pointer p-3 min-[380px]:p-4">
                <div class="col-trigger flex-1 h-full" data-col="0"></div>
                <div class="col-trigger flex-1 h-full" data-col="1"></div>
                <div class="col-trigger flex-1 h-full" data-col="2"></div>
                <div class="col-trigger flex-1 h-full" data-col="3"></div>
                <div class="col-trigger flex-1 h-full" data-col="4"></div>
                <div class="col-trigger flex-1 h-full" data-col="5"></div>
                <div class="col-trigger flex-1 h-full" data-col="6"></div>
            </div>
            <!-- Visual Grid -->
            <div class="grid grid-cols-7 gap-2 min-[380px]:gap-3 md:gap-board-gap" id="grid-visual">
                <!-- Grid items generated by JS -->
            </div>
        </div>
        <!-- Thinking Indicator -->
        <div class="absolute -top-12 left-1/2 -translate-x-1/2 bg-secondary text-on-secondary px-6 py-2 rounded-full font-bold shadow-lg opacity-0 -translate-y-4 transition-all duration-300 pointer-events-none z-30 flex items-center gap-2 border-2 border-white" id="thinking-overlay">
            <span class="material-symbols-outlined animate-spin text-sm">settings</span>
            <span class="thinking-dots">MÁQUINA PENSANDO</span>
        </div>
    </div>
    <!-- Machine Score Card -->
    <div class="flex flex-col gap-2 min-[380px]:gap-3 w-full max-w-[160px] md:max-w-none md:w-48 order-3 col-span-1">
        <div class="bg-secondary p-3 min-[380px]:p-4 md:p-6 rounded-2xl min-[380px]:rounded-3xl md:rounded-full flex flex-col items-center transition-all shadow-[0_4px_0_#b39700] min-[380px]:shadow-[0_8px_0_#b39700] border-2 min-[380px]:border-4 border-white" id="card-machine">
            <span class="font-label-caps text-xs min-[380px]:text-label-caps text-on-secondary uppercase">MÁQUINA</span>
            <span class="font-score-number text-2xl min-[380px]:text-score-number text-on-secondary" id="score-machine">0</span>
        </div>
        <!-- Restart Button -->
        <button class="flex items-center justify-center gap-1.5 py-2 px-3 md:py-4 md:px-6 rounded-full bg-white border-2 min-[380px]:border-4 border-primary text-primary font-extrabold hover:bg-primary-container active:translate-y-1 active:shadow-none shadow-[0_2px_0_#0056b3] min-[380px]:shadow-[0_4px_0_#0056b3] transition-all text-xs min-[380px]:text-sm md:text-base" onclick="resetGame()">
            <span class="material-symbols-outlined font-bold text-sm min-[380px]:text-base">refresh</span>
            REINICIAR TABLERO
        </button>
    </div>
</main>
<!-- Difficulty Modal -->
<div class="fixed inset-0 z-[110] flex items-center justify-center bg-soft-sky/95 backdrop-blur-md transition-opacity duration-500" id="difficulty-modal">
    <div class="flex flex-col items-center gap-3 min-[380px]:gap-4 max-w-md w-full mx-4 text-on-surface text-center max-h-[95vh] min-[380px]:max-h-[90vh] overflow-y-auto py-2 min-[380px]:py-4 px-2">
        <div class="flex flex-col items-center gap-1">
            <div class="bg-secondary-container p-2 min-[380px]:p-4 rounded-full shadow-lg mb-1">
                <span class="material-symbols-outlined text-4xl min-[380px]:text-6xl text-primary" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
            </div>
            <h1 class="font-headline-lg text-3xl min-[380px]:text-4xl md:text-5xl font-extrabold tracking-tighter text-primary">CONECTA 4</h1>
            <p class="text-on-surface-variant text-base min-[380px]:text-lg font-bold">Elige el nivel de tu oponente</p>
        </div>
        <div class="grid grid-cols-1 gap-2 w-full">
            <button class="group relative overflow-hidden bg-difficulty-easy border-4 border-white/40 hover:border-white shadow-lg p-3 min-[380px]:p-4 md:p-6 rounded-2xl min-[380px]:rounded-3xl md:rounded-full transition-all duration-300 text-left" data-difficulty="fácil">
                <div class="flex justify-between items-center text-white">
                    <div>
                        <h3 class="font-headline-md text-lg min-[380px]:text-xl font-extrabold">Fácil</h3>
                        <p class="text-xs min-[380px]:text-sm opacity-90 font-medium">La máquina juega al azar. Ideal para practicar.</p>
                    </div>
                    <span class="material-symbols-outlined text-2xl min-[380px]:text-3xl transition-transform group-hover:translate-x-1">chevron_right</span>
                </div>
            </button>
            <button class="group relative overflow-hidden bg-difficulty-medium border-4 border-white/40 hover:border-white shadow-lg p-3 min-[380px]:p-4 md:p-6 rounded-2xl min-[380px]:rounded-3xl md:rounded-full transition-all duration-300 text-left" data-difficulty="medio">
                <div class="flex justify-between items-center text-white">
                    <div>
                        <h3 class="font-headline-md text-lg min-[380px]:text-xl font-extrabold">Medio</h3>
                        <p class="text-xs min-[380px]:text-sm opacity-90 font-medium">Bloquea tus victorias y aprovecha sus oportunidades.</p>
                    </div>
                    <span class="material-symbols-outlined text-2xl min-[380px]:text-3xl transition-transform group-hover:translate-x-1">chevron_right</span>
                </div>
            </button>
            <button class="group relative overflow-hidden bg-difficulty-hard border-4 border-white/40 hover:border-white shadow-lg p-3 min-[380px]:p-4 md:p-6 rounded-2xl min-[380px]:rounded-3xl md:rounded-full transition-all duration-300 text-left" data-difficulty="difícil">
                <div class="flex justify-between items-center text-white">
                    <div>
                        <h3 class="font-headline-md text-lg min-[380px]:text-xl font-extrabold">Difícil</h3>
                        <p class="text-xs min-[380px]:text-sm opacity-90 font-medium">Juego estratégico centrado en el centro y trampas.</p>
                    </div>
                    <span class="material-symbols-outlined text-2xl min-[380px]:text-3xl transition-transform group-hover:translate-x-1">chevron_right</span>
                </div>
            </button>
            <button class="group relative overflow-hidden bg-difficulty-impossible border-4 border-white/40 hover:border-white shadow-lg p-3 min-[380px]:p-4 md:p-6 rounded-2xl min-[380px]:rounded-3xl md:rounded-full transition-all duration-300 text-left" data-difficulty="imposible">
                <div class="flex justify-between items-center text-white">
                    <div>
                        <h3 class="font-headline-md text-lg min-[380px]:text-xl font-extrabold">Imposible</h3>
                        <p class="text-xs min-[380px]:text-sm opacity-90 font-medium">Algoritmo minimax optimizado a máxima profundidad. ¿Puedes ganar?</p>
                    </div>
                    <span class="material-symbols-outlined text-2xl min-[380px]:text-3xl transition-transform group-hover:translate-x-1">chevron_right</span>
                </div>
            </button>
        </div>
    </div>
</div>

<!-- Winner Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-primary/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500" id="winner-modal">
<div class="bg-white p-12 rounded-[3rem] shadow-2xl flex flex-col items-center gap-6 max-w-sm w-full mx-4 border-8 border-primary">
<span class="material-symbols-outlined text-8xl text-secondary" id="winner-icon" style="font-variation-settings: 'FILL' 1;">stars</span>
<div class="text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2" id="winner-title">¡HAS GANADO!</h2>
<p class="text-on-surface-variant font-bold" id="winner-subtitle">¡Eres todo un campeón!</p>
</div>
<div class="flex flex-col gap-3 w-full">
<button class="w-full py-4 bg-primary text-white font-extrabold text-xl rounded-full hover:bg-on-primary-container transition-all active:translate-y-1 shadow-[0_6px_0_#004a99]" onclick="resetGame()">¡OTRA VEZ!</button>
<button class="w-full py-3 bg-soft-sky text-primary font-bold text-lg rounded-full hover:bg-primary-container transition-all active:translate-y-1 border-2 border-primary/20" id="btn-see-board">Ver Tablero</button>
</div>
</div>
</div>

<!-- Floating Game Over Bar -->
<div id="game-over-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[90] flex items-center gap-4 bg-white/90 backdrop-blur-md border-4 border-primary shadow-2xl rounded-full px-6 py-3 transition-all duration-500 transform translate-y-28 opacity-0 pointer-events-none">
    <span class="flex items-center gap-2 font-bold text-primary">
        <span id="game-over-bar-icon" class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">stars</span>
        <span id="game-over-bar-text" class="text-sm md:text-base font-extrabold">¡Partida Finalizada!</span>
    </span>
    <div class="h-6 w-[2px] bg-primary/20"></div>
    <div class="flex items-center gap-2">
        <button id="btn-bar-show-modal" class="py-2 px-4 rounded-full bg-soft-sky text-primary text-xs md:text-sm font-bold hover:bg-primary-container active:scale-95 transition-all">
            Ver Detalle
        </button>
        <button class="py-2 px-4 rounded-full bg-primary text-white text-xs md:text-sm font-extrabold hover:opacity-90 active:scale-95 transition-all shadow-md shadow-primary/20" onclick="resetGame()">
            ¡OTRA VEZ!
        </button>
    </div>
</div>
<script type="module" src="./app/main.js"></script>
</body>
</html>
