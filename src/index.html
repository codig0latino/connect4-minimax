<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>CONNECT FOUR - Kinetic Connect</title>
<link rel="stylesheet" href="./styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100..900&display=swap" rel="stylesheet"/>
<!-- Tailwind Configuration -->
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Board specific styling */
        .game-board {
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1);
        }

        .slot {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.3), inset -2px -2px 4px rgba(255,255,255,0.05);
        }

        .piece {
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        @keyframes dropIn {
            0% { transform: translateY(-400px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .piece-red {
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #ba1a1a);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 -4px 6px rgba(0,0,0,0.2);
        }

        .piece-yellow {
            background: radial-gradient(circle at 30% 30%, #ffe170, #705d00);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 -4px 6px rgba(0,0,0,0.2);
        }

        .ghost-piece {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Hide scrollbars for clean full-screen look */
        body {
            overflow: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        .win-line {
            animation: pulse-win 1s infinite alternate;
            z-index: 20;
        }

        @keyframes pulse-win {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.3); }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-4 bg-background dark:bg-on-background">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary text-3xl">grid_4x4</span>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary dark:text-inverse-primary tracking-tighter">CONNECT FOUR</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200" title="Help">help_outline</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 px-container-padding pt-24 pb-32 overflow-hidden">
<!-- Player Score Card -->
<div class="flex flex-col gap-4 w-full md:w-48 order-2 md:order-1">
<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-center transition-all border-b-4 border-transparent shadow-sm" id="card-player">
<span class="font-label-caps text-label-caps text-on-surface-variant">YOU</span>
<span class="font-score-number text-score-number text-primary" id="score-player">0</span>
</div>
<div class="flex items-center justify-center gap-2 py-2 px-4 rounded-full bg-primary-container text-white animate-pulse" id="turn-indicator">
<div class="w-3 h-3 rounded-full bg-error" id="turn-dot"></div>
<span class="font-label-caps text-sm tracking-widest uppercase" id="turn-text">YOUR TURN</span>
</div>
</div>
<!-- The Game Board Section -->
<div class="relative order-1 md:order-2">
<!-- Ghost Piece Layer -->
<div class="absolute -top-16 left-0 w-full flex justify-around px-2 pointer-events-none" id="ghost-layer">
<!-- Ghost items generated by JS -->
</div>
<!-- Main Board -->
<div class="game-board bg-primary p-3 rounded-2xl flex flex-col gap-3 md:gap-board-gap relative z-10" id="board-container">
<!-- Grid of 7 columns, 6 rows -->
<div class="flex gap-3 md:gap-board-gap">
<!-- Column interaction overlay -->
<div class="flex gap-3 md:gap-board-gap h-full w-full absolute inset-0 z-20 cursor-pointer">
<div class="col-trigger flex-1 h-full" data-col="0"></div>
<div class="col-trigger flex-1 h-full" data-col="1"></div>
<div class="col-trigger flex-1 h-full" data-col="2"></div>
<div class="col-trigger flex-1 h-full" data-col="3"></div>
<div class="col-trigger flex-1 h-full" data-col="4"></div>
<div class="col-trigger flex-1 h-full" data-col="5"></div>
<div class="col-trigger flex-1 h-full" data-col="6"></div>
</div>
<!-- Visual Grid -->
<div class="grid grid-cols-7 gap-3 md:gap-board-gap" id="grid-visual">
<!-- Slots will be injected here -->
</div>
</div>
</div>
</div>
<!-- Machine Score Card -->
<div class="flex flex-col gap-4 w-full md:w-48 order-3">
<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-center transition-all border-b-4 border-transparent shadow-sm" id="card-machine">
<span class="font-label-caps text-label-caps text-on-surface-variant">MACHINE</span>
<span class="font-score-number text-score-number text-primary" id="score-machine">0</span>
</div>
<!-- Secondary buttons on desktop, redundant but good for UI weight -->
<button class="hidden md:flex items-center justify-center gap-2 py-3 px-6 rounded-xl border-2 border-primary text-primary font-bold hover:bg-primary/5 active:scale-95 transition-all" onclick="resetGame()">
<span class="material-symbols-outlined">refresh</span>
                RESET BOARD
            </button>
</div>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container dark:bg-surface-container-highest shadow-[0_-4px_12px_rgba(0,0,0,0.05)] md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-container-high transition-colors active:scale-95" onclick="resetGame()">
<span class="material-symbols-outlined">refresh</span>
<span class="font-label-caps text-xs">Restart</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 active:scale-95 transition-all">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-caps text-xs">Rules</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-caps text-xs">Settings</span>
</button>
</nav>
<!-- Winner Overlay (Hidden by default) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-background/80 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-500" id="winner-modal">
<div class="bg-white p-12 rounded-3xl shadow-2xl flex flex-col items-center gap-6 max-w-sm w-full mx-4 border border-outline-variant">
<span class="material-symbols-outlined text-6xl text-secondary-container" id="winner-icon" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
<div class="text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2" id="winner-title">YOU WIN!</h2>
<p class="text-on-surface-variant">A brilliant display of strategy.</p>
</div>
<button class="w-full py-4 bg-primary text-white font-bold rounded-2xl hover:bg-primary-container transition-all active:scale-95 shadow-lg" onclick="resetGame()">PLAY AGAIN</button>
</div>
</div>
    </div>
    <script type="module" src="./app/main.js"></script>
</body>
</html>
